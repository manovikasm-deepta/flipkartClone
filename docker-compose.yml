services:
  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     flipkart
      POSTGRES_PASSWORD: flipkart
      POSTGRES_DB:       flipkart_dev
    ports:
      - '5433:5432'      # host 5433 to avoid clash with a local postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U flipkart -d flipkart_dev']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Express API ──────────────────────────────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: runtime
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV:     development
      PORT:         5000
      DATABASE_URL: postgresql://flipkart:flipkart@db:5432/flipkart_dev
      JWT_SECRET:   local-docker-dev-secret-key-minimum-32-chars
      JWT_EXPIRES_IN: 7d
      CLIENT_URL:   http://localhost:5173
      CORS_ORIGINS: http://localhost:5173
    ports:
      - '5000:5000'
    volumes:
      - ./server/src:/app/src:ro      # hot-reload source (nodemon watches /app/src)
      - /app/node_modules             # prevent host node_modules from overriding
    command: ['node', 'server.js']

  # ── Vite dev server ──────────────────────────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: builder
    restart: unless-stopped
    depends_on:
      - server
    environment:
      VITE_API_URL: http://localhost:5000/api
    ports:
      - '5173:5173'
    volumes:
      - ./client/src:/app/src:ro      # Vite HMR watches /app/src
      - /app/node_modules
    command: ['npx', 'vite', '--host', '0.0.0.0']

volumes:
  postgres_data:
