name: Deploy to Vercel

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── Deploy backend (Express API) ─────────────────────────────────────────────
  deploy-backend:
    name: Deploy → Vercel (Backend)
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # Push runtime secrets into the backend Vercel project
      - name: Configure backend environment variables
        run: |
          TOKEN="${{ secrets.VERCEL_TOKEN }}"
          PROJECT="prj_KSow1Ja17JfcMAmu0CE7p1NB9nTv"

          push_env() {
            STATUS=$(curl -s -o /tmp/vercel_env_response.json -w "%{http_code}" \
              -X POST "https://api.vercel.com/v10/projects/$PROJECT/env?upsert=true" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"key\":\"$1\",\"value\":\"$2\",\"type\":\"encrypted\",\"target\":[\"production\"]}")
            echo "  push_env $1 → HTTP $STATUS"
          }

          push_env "NODE_ENV"     "production"
          push_env "GMAIL_USER"   "mukkerlamanovikas@gmail.com"
          push_env "GMAIL_PASS"   "xhihqvmjbxcdwcga"
          push_env "DATABASE_URL" "${{ secrets.DATABASE_URL }}"
          push_env "JWT_SECRET"   "${{ secrets.JWT_SECRET }}"

      # Resolve Vercel account/org ID from the project API
      # For personal accounts accountId may be empty; that's OK — VERCEL_ORG_ID is optional
      - name: Resolve Vercel account ID
        id: org
        run: |
          RESPONSE=$(curl -s "https://api.vercel.com/v9/projects/prj_KSow1Ja17JfcMAmu0CE7p1NB9nTv" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}")
          ORG=$(echo "$RESPONSE" | python3 -c "
import sys,json
try:
    d=json.load(sys.stdin)
    print(d.get('accountId') or d.get('ownerId') or '')
except:
    print('')
" 2>/dev/null || echo "")
          echo "Account ID: '${ORG}'"
          echo "id=${ORG}" >> $GITHUB_OUTPUT

      - name: Deploy server to Vercel
        working-directory: server
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_PROJECT_ID: prj_KSow1Ja17JfcMAmu0CE7p1NB9nTv
          # VERCEL_ORG_ID is optional for personal accounts; set if resolved
          VERCEL_ORG_ID: ${{ steps.org.outputs.id }}

  # ── Seed production database ─────────────────────────────────────────────────
  seed-db:
    name: Seed Production DB
    runs-on: ubuntu-latest
    needs: deploy-backend
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: cd server && npm ci

      - name: Run migrations
        working-directory: server
        env:
          NODE_ENV:     production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run migrate

      - name: Run seed
        working-directory: server
        env:
          NODE_ENV:     production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run seed
