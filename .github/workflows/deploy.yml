name: Deploy to Vercel

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── Deploy backend (Express API) ─────────────────────────────────────────────
  deploy-backend:
    name: Deploy → Vercel (Backend)
    runs-on: ubuntu-latest
    environment: "Production – flipkart-clone"
    outputs:
      backend-url: ${{ steps.deploy-step.outputs.backend-url }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # Push runtime secrets into the SERVER Vercel project via REST API
      - name: Configure server environment variables
        env:
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_SERVER }}
          DATABASE_URL:      ${{ secrets.DATABASE_URL }}
          JWT_SECRET:        ${{ secrets.JWT_SECRET }}
        run: |
          echo "Token length: ${#VERCEL_TOKEN}"
          echo "Org ID: $VERCEL_ORG_ID"
          echo "Project ID: $VERCEL_PROJECT_ID"

          if [ -z "$VERCEL_TOKEN" ]; then
            echo "FATAL: VERCEL_TOKEN is empty"
            exit 1
          fi

          push_env() {
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "https://api.vercel.com/v10/projects/$VERCEL_PROJECT_ID/env?upsert=true&teamId=$VERCEL_ORG_ID" \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"key\":\"$1\",\"value\":\"$2\",\"type\":\"encrypted\",\"target\":[\"production\"]}")
            echo "  push_env $1 → HTTP $STATUS"
          }

          push_env "NODE_ENV"     "production"
          push_env "GMAIL_USER"   "mukkerlamanovikas@gmail.com"
          push_env "GMAIL_PASS"   "xhihqvmjbxcdwcga"
          push_env "DATABASE_URL" "$DATABASE_URL"
          push_env "JWT_SECRET"   "$JWT_SECRET"
          push_env "CORS_ORIGINS" "https://flipkart-clone-beta-two.vercel.app"

      # Link to the server Vercel project — run from REPO ROOT so Vercel resolves
      # the project's "Root Directory = server" setting correctly (not server/server)
      - name: Link server to Vercel project
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_SERVER }}
        run: |
          mkdir -p .vercel
          echo "{\"orgId\":\"$VERCEL_ORG_ID\",\"projectId\":\"$VERCEL_PROJECT_ID\"}" \
            > .vercel/project.json
          echo "Linked: $(cat .vercel/project.json)"

      - name: Deploy server to Vercel
        id: deploy-step
        env:
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_SERVER }}
        run: |
          vercel deploy --prod --yes --token="$VERCEL_TOKEN" 2>&1 | tee /tmp/deploy-out.log
          EXIT=${PIPESTATUS[0]}
          echo "=== Deploy output ==="
          cat /tmp/deploy-out.log

          # Extract the aliased production URL so the frontend can point to it
          ALIASED=$(grep -oP '(?<=Aliased\s{5})https://\S+' /tmp/deploy-out.log | head -1)
          if [ -z "$ALIASED" ]; then
            # Fall back to the production URL if no alias line found
            ALIASED=$(grep -oP '(?<=Production\s{2})https://\S+' /tmp/deploy-out.log | head -1)
          fi
          echo "Backend URL: $ALIASED"
          echo "backend-url=$ALIASED" >> $GITHUB_OUTPUT

          echo "## Backend Deploy" >> $GITHUB_STEP_SUMMARY
          echo "Exit code: $EXIT" >> $GITHUB_STEP_SUMMARY
          echo "Backend URL: $ALIASED" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/deploy-out.log >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          exit $EXIT

  # ── Seed production database ─────────────────────────────────────────────────
  seed-db:
    name: Seed Production DB
    runs-on: ubuntu-latest
    needs: deploy-backend
    continue-on-error: true
    environment: "Production – flipkart-clone"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: cd server && npm ci

      - name: Run migrations
        working-directory: server
        env:
          NODE_ENV:     production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run migrate

      - name: Run seed
        working-directory: server
        env:
          NODE_ENV:     production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run seed

  # ── Deploy frontend (React/Vite) ─────────────────────────────────────────────
  deploy-frontend:
    name: Deploy → Vercel (Frontend)
    runs-on: ubuntu-latest
    needs: deploy-backend
    environment: "Production – flipkart-clone"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # Push VITE_API_URL to the CLIENT Vercel project so GitHub-integration
      # builds (which run outside CI) also get the correct backend URL.
      - name: Configure frontend environment variables
        env:
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_CLIENT }}
          BACKEND_URL:       ${{ needs.deploy-backend.outputs.backend-url }}
        run: |
          push_env() {
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "https://api.vercel.com/v10/projects/$VERCEL_PROJECT_ID/env?upsert=true&teamId=$VERCEL_ORG_ID" \
              -H "Authorization: Bearer $VERCEL_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"key\":\"$1\",\"value\":\"$2\",\"type\":\"encrypted\",\"target\":[\"production\"]}")
            echo "  push_env $1 → HTTP $STATUS"
          }
          API_BASE="${BACKEND_URL:-https://flipkart-clone-api-delta.vercel.app}"
          push_env "VITE_API_URL" "${API_BASE}/api"
          echo "VITE_API_URL = ${API_BASE}/api"

      # Install client deps directly with npm — no vercel build involved.
      # Avoids the "spawn sh ENOENT" regression in Vercel CLI 54.14+.
      - name: Install client dependencies
        working-directory: client
        run: npm ci

      # Build the SPA with VITE_API_URL baked into the bundle.
      - name: Build frontend
        working-directory: client
        env:
          BACKEND_URL: ${{ needs.deploy-backend.outputs.backend-url }}
        run: |
          API_BASE="${BACKEND_URL:-https://flipkart-clone-api-delta.vercel.app}"
          VITE_API_URL="${API_BASE}/api" npm run build

      # Assemble the Vercel Build Output API v3 structure so we can deploy
      # with --prebuilt and skip any remote build entirely.
      - name: Create Vercel output structure
        run: |
          mkdir -p client/.vercel/output/static
          cp -rT client/dist client/.vercel/output/static
          cat > client/.vercel/output/config.json << 'VERCEL_CONFIG'
          {
            "version": 3,
            "routes": [
              {
                "src": "/assets/(.*)",
                "headers": { "Cache-Control": "public, max-age=31536000, immutable" }
              },
              {
                "src": "/(.*)",
                "headers": {
                  "X-Content-Type-Options": "nosniff",
                  "X-Frame-Options": "DENY"
                }
              },
              { "handle": "filesystem" },
              { "src": "/(.*)", "dest": "/index.html" }
            ]
          }
          VERCEL_CONFIG

      # Write project.json so the CLI knows which Vercel project to deploy to.
      - name: Link frontend to Vercel project
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_CLIENT }}
        run: |
          echo "{\"orgId\":\"$VERCEL_ORG_ID\",\"projectId\":\"$VERCEL_PROJECT_ID\"}" \
            > client/.vercel/project.json

      # Upload pre-built artifacts — no remote build, no cache issues.
      - name: Deploy to production
        working-directory: client
        env:
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_CLIENT }}
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
