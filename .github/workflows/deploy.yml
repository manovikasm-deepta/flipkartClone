name: Deploy to Vercel

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  VERCEL_PROJECT_ID: prj_KSow1Ja17JfcMAmu0CE7p1NB9nTv

jobs:
  deploy:
    name: Deploy → Vercel
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # Push runtime env vars into the Vercel project via REST API
      - name: Configure Vercel environment variables
        run: |
          PROJECT="prj_KSow1Ja17JfcMAmu0CE7p1NB9nTv"
          TOKEN="${{ secrets.VERCEL_TOKEN }}"

          push_env() {
            curl -s -X POST "https://api.vercel.com/v10/projects/$PROJECT/env?upsert=true" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"key\":\"$1\",\"value\":\"$2\",\"type\":\"encrypted\",\"target\":[\"production\"]}" > /dev/null
          }

          push_env "NODE_ENV"     "production"
          push_env "GMAIL_USER"   "mukkerlamanovikas@gmail.com"
          push_env "GMAIL_PASS"   "xhihqvmjbxcdwcga"
          push_env "DATABASE_URL" "${{ secrets.DATABASE_URL }}"
          push_env "JWT_SECRET"   "${{ secrets.JWT_SECRET }}"

      # Fetch org ID from the project (accountId field)
      - name: Get Vercel org ID from project
        id: org
        run: |
          PROJECT="prj_KSow1Ja17JfcMAmu0CE7p1NB9nTv"
          TOKEN="${{ secrets.VERCEL_TOKEN }}"
          ORG=$(curl -s "https://api.vercel.com/v9/projects/$PROJECT" \
            -H "Authorization: Bearer $TOKEN" \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('accountId',''))")
          echo "Got org: $ORG"
          echo "id=$ORG" >> $GITHUB_OUTPUT

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ steps.org.outputs.id }}

      - name: Deploy to production
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ steps.org.outputs.id }}

  seed-db:
    name: Seed Production DB
    runs-on: ubuntu-latest
    needs: deploy
    environment: production

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: cd server && npm ci

      - name: Run migrations
        working-directory: server
        env:
          NODE_ENV:     production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run migrate

      - name: Run seed
        working-directory: server
        env:
          NODE_ENV:     production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run seed
