name: Deploy to Vercel

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false

# These IDs are from README.md — not secrets, just project identifiers
env:
  VERCEL_ORG_ID:      team_6bXzC8B815868CQWqvcagAmz
  VERCEL_SERVER_ID:   prj_hJGAKSsGkYQC0Xv18keD0D1Ztz5s
  VERCEL_CLIENT_ID:   prj_KSow1Ja17JfcMAmu0CE7p1NB9nTv

jobs:
  # ── Deploy backend (Express API) ─────────────────────────────────────────────
  deploy-backend:
    name: Deploy → Vercel (Backend)
    runs-on: ubuntu-latest
    environment: Production - flipkart-clone
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      # Push runtime secrets into the SERVER Vercel project
      - name: Configure server environment variables
        run: |
          TOKEN="${{ secrets.VERCEL_TOKEN }}"
          PROJECT="${{ env.VERCEL_SERVER_ID }}"
          TEAM="${{ env.VERCEL_ORG_ID }}"

          push_env() {
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "https://api.vercel.com/v10/projects/$PROJECT/env?upsert=true&teamId=$TEAM" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"key\":\"$1\",\"value\":\"$2\",\"type\":\"encrypted\",\"target\":[\"production\"]}")
            echo "  push_env $1 → HTTP $STATUS"
          }

          push_env "NODE_ENV"     "production"
          push_env "GMAIL_USER"   "mukkerlamanovikas@gmail.com"
          push_env "GMAIL_PASS"   "xhihqvmjbxcdwcga"
          push_env "DATABASE_URL" "${{ secrets.DATABASE_URL }}"
          push_env "JWT_SECRET"   "${{ secrets.JWT_SECRET }}"

      # Create .vercel/project.json so the CLI knows which org+project to use
      # This is the most reliable approach — CLI reads this file before any env var
      - name: Link server to Vercel project
        working-directory: server
        run: |
          mkdir -p .vercel
          echo '{"orgId":"team_6bXzC8B815868CQWqvcagAmz","projectId":"prj_hJGAKSsGkYQC0Xv18keD0D1Ztz5s"}' \
            > .vercel/project.json
          echo "Linked: $(cat .vercel/project.json)"

      - name: Deploy server to Vercel
        working-directory: server
        run: |
          OUTPUT=$(vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }} 2>&1)
          EXIT=$?
          echo "$OUTPUT"
          echo "## Backend Deploy" >> $GITHUB_STEP_SUMMARY
          echo "Exit: $EXIT" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$OUTPUT" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          exit $EXIT

  # ── Seed production database ─────────────────────────────────────────────────
  seed-db:
    name: Seed Production DB
    runs-on: ubuntu-latest
    needs: deploy-backend
    environment: Production - flipkart-clone
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install server dependencies
        run: cd server && npm ci

      - name: Run migrations
        working-directory: server
        env:
          NODE_ENV:     production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run migrate

      - name: Run seed
        working-directory: server
        env:
          NODE_ENV:     production
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run seed

  # ── Deploy frontend (React/Vite) ─────────────────────────────────────────────
  deploy-frontend:
    name: Deploy → Vercel (Frontend)
    runs-on: ubuntu-latest
    needs: deploy-backend
    environment: Production - flipkart-clone
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings
        working-directory: client
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ env.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ env.VERCEL_CLIENT_ID }}

      - name: Build project artifacts
        working-directory: client
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ env.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ env.VERCEL_CLIENT_ID }}

      - name: Deploy to production
        working-directory: client
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID:     ${{ env.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ env.VERCEL_CLIENT_ID }}
